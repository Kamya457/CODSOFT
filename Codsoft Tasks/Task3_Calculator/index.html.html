<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator" role="application" aria-label="Simple calculator">
      <input type="text" id="display" readonly aria-label="Calculator display" />

      <div class="buttons" role="group" aria-label="Calculator buttons">
        <button data-action="clear">C</button>
        <button data-action="delete">DEL</button>
        <button data-action="percent">%</button>
        <button data-action="operator">/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button data-action="operator">*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button data-action="operator">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button data-action="operator">+</button>

        <button class="span-two">0</button>
        <button>.</button>
        <button class="span-two" data-action="equals">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
